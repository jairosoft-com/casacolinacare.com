# -------------------------------------------------------------------
# Story Point Scale
# -------------------------------------------------------------------
story_point_scale:
  description: |
    Fibonacci-based scale aligned with Jodex iteration constraints.
    Every story must fit in ONE context window, so the scale tops out
    at 8 (anything bigger should be split).
  values:
    1:
      label: "Trivial"
      signals:
        - "1-2 acceptance criteria"
        - "Single file change"
        - "No new dependencies"
      examples:
        - "Fix a typo in structured data"
        - "Update a constant value"
    2:
      label: "Small"
      signals:
        - "2-3 acceptance criteria"
        - "1-2 files changed"
        - "Straightforward logic"
      examples:
        - "Add a database column and migration"
        - "Update a component's props"
    3:
      label: "Medium"
      signals:
        - "3-5 acceptance criteria"
        - "2-4 files changed"
        - "Some conditional logic or validation"
      examples:
        - "Add a new UI component to an existing page"
        - "Add server-side validation to an endpoint"
    5:
      label: "Large"
      signals:
        - "5-7 acceptance criteria"
        - "4-6 files changed"
        - "Multiple interacting parts"
        - "Requires E2E + browser verification"
      examples:
        - "Add a filter dropdown with URL persistence"
        - "Build a form with client + server validation"
    8:
      label: "Extra Large (consider splitting)"
      signals:
        - "7+ acceptance criteria"
        - "6+ files changed"
        - "Cross-cutting concern"
      examples:
        - "Add notification system with preferences"
        - "Refactor API endpoint with new schema"

# -------------------------------------------------------------------
# Estimation Heuristics
# -------------------------------------------------------------------
estimation_heuristics:
  primary_factors:
    - factor: "Acceptance criteria count"
      weight: "high"
      rule: "1-2 ACs → 1pt, 3-4 ACs → 2-3pt, 5-6 ACs → 5pt, 7+ ACs → 8pt"
    - factor: "Story type"
      weight: "medium"
      rule: |
        Schema/migration → typically 1-2pt
        Backend logic → typically 2-3pt
        UI component → typically 3-5pt (browser verification adds complexity)
        Full-stack (backend + UI) → typically 5-8pt
    - factor: "Dependency depth"
      weight: "low"
      rule: "Stories that depend on earlier stories are inherently riskier (+1pt)"

  adjustments:
    - "+1 if story requires E2E tests"
    - "+1 if story requires browser verification"
    - "-1 if story is a pure data/config change"

