# See cc-gen-prd-task/SKILL.md "Hour Estimation" section for full implementation.

context: |
  When prd.json is created by cc-gen-prd-task, user stories have no sizing.
  Azure DevOps work items are created without story points, making sprint
  planning harder. The Jodex agent sets hour-based estimates (OriginalEstimate,
  CompletedWork, RemainingWork) at the Task level during execution, but
  story-level sizing is never set.

  This plan adds a `storyPoints` field to prd.json so ADO User Story
  work items have sizing from the start.

current_state:
  prd_json_schema: "No storyPoints field exists"
  cc_gen_prd_task: "No estimation logic"
  cc_azure_board_sync: "Only syncs System.State — no estimate fields"
  existing_prd_files: "None of the 4 prd.json files have storyPoints"
  jodex_agent: "Sets hour-based OriginalEstimate on Tasks (0.25h–2h), not story points"

